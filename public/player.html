<script>

var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJoc3N6aXJ0Ynl2YWx1Z21iZWNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3Mjg3MzUsImV4cCI6MjA5MDMwNDczNX0.MK3sYXhbdVtijzAkXJXvMlF1t0xfk6bRumBnovbQkRs';
var sb,TC={react:'#9B59B6',recall:'#FF6B35',reflex:'#00CED1',replay:'#00D9A5',ritmo:'#9ACD32',beat:'#FFD700'},TN={react:'THE REACT',recall:'THE RECALL',reflex:'THE REFLEX',replay:'THE REPLAY',ritmo:'THE RITMO',beat:'THE BEAT'},TE={react:'🟣',recall:'🟠',reflex:'🔵',replay:'🟢',ritmo:'🟡',beat:'🏀'},RL={1:'Rookie',2:'Developing',3:'Solid',4:'Advanced',5:'Elite',6:'Pro',7:'All-Star',8:'MVP',9:'Hall of Fame',10:'GOAT'},SL={slow:'Training',med:'Tempo',fast:'Elite'};

(async function(){

await new Promise(function(r,j){var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';s.onload=r;s.onerror=j;document.head.appendChild(s)});

function render(p,pm,bt,seasons){var h='';
