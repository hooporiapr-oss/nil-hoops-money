<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — Hooporia</title>
<link rel="icon" href="/hooporia.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#0a0a0f;--black2:#111118;--black3:#1a1a22;--surface:#16161e;--gold:#FFD700;--gold-dim:rgba(255,215,0,0.08);--gold-border:rgba(255,215,0,0.15);--orange:#FF6B35;--white:#fafaf9;--gray:#7a7a8a;--gray-light:#aaa;--green:#22c55e;--purple:#9B59B6;--cyan:#00CED1;--teal:#00D9A5}
body{font-family:'Outfit',sans-serif;background:var(--black);color:var(--white);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;line-height:1.6;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
button{cursor:pointer;border:none;font-family:inherit}
input{font-family:inherit}
html[lang="en"] .es{display:none!important}
html[lang="es"] .en{display:none!important}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,10,15,.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.04);padding:0 24px}
.nav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px}
.nav-brand{display:flex;align-items:center;gap:10px}
.nav-brand img{height:32px}
.nav-brand span{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px}
.nav-right{display:flex;align-items:center;gap:14px}
.nav-link{font-size:.78rem;font-weight:600;color:var(--gray);transition:color .2s}
.nav-link:hover{color:var(--white)}
.lang-btn{padding:5px 10px;border-radius:5px;font-size:.65rem;font-weight:700;background:transparent;color:var(--gray);transition:all .2s;letter-spacing:.05em;border:none;cursor:pointer}
.lang-btn.active{background:var(--gold);color:var(--black)}
.nav-cta{padding:8px 22px;border-radius:8px;font-size:.78rem;font-weight:700;background:var(--gold);color:var(--black);border:none;cursor:pointer;transition:all .2s;font-family:'Outfit',sans-serif}
.nav-cta:hover{background:#ffe44d}
.hamburger{background:none;border:none;color:var(--white);font-size:1.4rem;cursor:pointer;padding:6px 10px;line-height:1;border-radius:8px;transition:background .2s}
.hamburger:hover{background:rgba(255,255,255,.06)}
.mobile-menu{display:none;position:fixed;top:64px;left:0;right:0;background:rgba(10,10,15,.97);backdrop-filter:blur(20px);padding:16px 24px 24px;border-bottom:1px solid rgba(255,255,255,.06);z-index:99;flex-direction:column;gap:4px}
.mobile-menu.open{display:flex}
.mobile-menu a{display:block;padding:12px 16px;font-size:.88rem;font-weight:600;color:var(--gray-light);border-radius:10px;transition:all .2s}
.mobile-menu a:hover{background:rgba(255,255,255,.04);color:var(--white)}
.mm-lang{display:flex;gap:4px;padding:12px 16px}
.mm-cta{background:var(--gold)!important;color:var(--black)!important;text-align:center;font-weight:700!important;border-radius:10px!important;margin-top:8px}

/* CARD */
.card{background:#fff;border-radius:16px;padding:48px 40px;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.4);margin-top:80px}
.card h1{font-size:1.75rem;font-weight:900;color:#000;text-align:center;margin-bottom:4px}
.card .subtitle{font-size:.9rem;color:#666;text-align:center;margin-bottom:32px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:.85rem;font-weight:700;color:#000;margin-bottom:6px}
.form-group input{width:100%;padding:14px 16px;font-size:1rem;font-weight:500;color:#000;background:#fff;border:2px solid #bbb;border-radius:10px;outline:none;transition:border-color .2s}
.form-group input:focus{border-color:var(--orange)}
.form-group input::placeholder{color:#aaa;font-weight:400}
.btn-primary{width:100%;padding:16px;background:var(--orange);color:#fff;border-radius:10px;font-size:1rem;font-weight:800;letter-spacing:.03em;text-transform:uppercase;transition:all .25s;text-align:center}
.btn-primary:hover{background:#f4832f}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.error-msg{background:#fef2f2;border:1px solid #fca5a5;color:#dc2626;padding:12px 16px;border-radius:8px;font-size:.85rem;font-weight:600;margin-bottom:16px;display:none}
.signup-link{text-align:center;margin-top:24px;font-size:.875rem;color:#666}
.signup-link a{color:var(--orange);font-weight:700}

@media(max-width:520px){
  .card{padding:32px 24px;margin-top:72px}
  .nav-link{display:none}
  .nav-cta{display:none}
}
</style>
<script>
var currentLang='en';
function setLang(l){currentLang=l;document.documentElement.lang=l;
document.querySelectorAll('[data-en]').forEach(function(el){var v=el.getAttribute('data-'+l);if(v){if(v.indexOf('<')!==-1)el.innerHTML=v;else el.textContent=v}});
document.querySelectorAll('.lang-btn').forEach(function(b){b.classList.toggle('active',b.dataset.l===l)});
try{localStorage.setItem('lc-lang',l)}catch(e){}}
</script>
</head>
<body>
<script>function toggleMenu(){var m=document.getElementById('mobileMenu');var b=document.getElementById('hamBtn');if(m.classList.contains('open')){m.classList.remove('open');b.textContent='☰'}else{m.classList.add('open');b.textContent='✕'}}</script>
<nav><div class="nav-inner">
<a href="/" class="nav-brand"><img src="/hooporia.png" alt="Hooporia"><span>HOOPORIA</span></a>
<div class="nav-right">
<a href="/programs.html" class="nav-link" data-en="Programs" data-es="Programas">Programs</a>
<a href="/cognitive-report.html" class="nav-link" data-en="AI Report" data-es="Reporte IA">AI Report</a>
<a href="/cognitive-hoops.html" class="nav-link" data-en="Drills" data-es="Drills">Drills</a>
<button class="hamburger" id="hamBtn" onclick="toggleMenu()" aria-label="Menu">☰</button>
<a href="/join.html"><button class="nav-cta" data-en="Join Free" data-es="Únete Gratis">Join Free</button></a>
</div></div>
<div class="mobile-menu" id="mobileMenu">
<a href="/programs.html" data-en="Programs" data-es="Programas">Programs</a>
<a href="/cognitive-report.html" data-en="AI Report" data-es="Reporte IA">AI Report</a>
<a href="/cognitive-hoops.html" data-en="Cognitive Drills" data-es="Drills Cognitivos">Cognitive Drills</a>
<a href="/discover.html" data-en="Discover" data-es="Descubrir">Discover</a>
<a href="/leaderboard.html" data-en="Leaderboard" data-es="Clasificación">Leaderboard</a>
<a href="/ritnome.html" data-en="RITNOME™" data-es="RITNOME™">RITNOME™</a>
<div class="mm-lang"><button class="lang-btn active" data-l="en" onclick="setLang('en')">EN</button><button class="lang-btn" data-l="es" onclick="setLang('es')">ES</button></div>
<a href="/join.html" class="mm-cta" data-en="Join Free" data-es="Únete Gratis">Join Free</a>
</div></nav>

<div class="card">
  <h1 class="en">Welcome Back</h1><h1 class="es">Bienvenido</h1>
  <p class="subtitle en">Log in to your NIL profile</p><p class="subtitle es">Entra a tu perfil NIL</p>
  <div class="error-msg" id="loginError"></div>
  <div class="form-group">
    <label class="en">Email</label><label class="es">Correo</label>
    <input type="email" id="email" placeholder="you@email.com" autocomplete="email">
  </div>
  <div class="form-group">
    <label class="en">Password</label><label class="es">Contraseña</label>
    <input type="password" id="password" placeholder="Your password" autocomplete="current-password">
  </div>
  <button class="btn-primary" id="loginBtn" onclick="doLogin()"><span class="en">Log In</span><span class="es">Entrar</span></button>
  <div class="signup-link"><span class="en">Don't have a profile? <a href="/join.html">Create one free</a></span><span class="es">¿No tienes perfil? <a href="/join.html">Crea uno gratis</a></span></div>
</div>
<script>
var SB_URL='https://rhsszirtbyvalugmbecm.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJoc3N6aXJ0Ynl2YWx1Z21iZWNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3Mjg3MzUsImV4cCI6MjA5MDMwNDczNX0.MK3sYXhbdVtijzAkXJXvMlF1t0xfk6bRumBnovbQkRs';
var sb=null;
async function loadSB(){if(sb)return sb;await new Promise(function(r,j){var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';s.onload=r;s.onerror=j;document.head.appendChild(s)});sb=window.supabase.createClient(SB_URL,SB_KEY);return sb}
async function doLogin(){
  var err=document.getElementById('loginError');err.style.display='none';
  var email=document.getElementById('email').value.trim(),pw=document.getElementById('password').value;
  if(!email||!email.includes('@')){err.textContent=currentLang==='es'?'Correo inválido':'Valid email required';err.style.display='block';return}
  if(!pw){err.textContent=currentLang==='es'?'Ingresa tu contraseña':'Enter your password';err.style.display='block';return}
  var btn=document.getElementById('loginBtn');btn.disabled=true;btn.textContent=currentLang==='es'?'Entrando...':'Logging in...';
  try{var client=await loadSB();var{error}=await client.auth.signInWithPassword({email:email,password:pw});if(error)throw error;window.location.href='/my-profile.html'}catch(e){btn.disabled=false;btn.innerHTML='<span class="en">Log In</span><span class="es">Entrar</span>';err.textContent=e.message||'Login failed';err.style.display='block'}
}
document.addEventListener('keydown',function(e){if(e.key==='Enter')doLogin()});
try{var sl=localStorage.getItem('lc-lang');if(sl)setLang(sl);else setLang('en')}catch(e){setLang('en')}
</script>
</body>
</html>
